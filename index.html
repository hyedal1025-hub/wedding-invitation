<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Invitation</title>

  <style>
    body {
      margin: 0;
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #fafafa;
      color: #333;
      text-align: center;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
    }

    .section {
      padding: 40px 20px;
    }

    .main-img {
      width: 100%;
      height: auto;
    }

    h1 {
      font-size: 26px;
      margin: 20px 0 10px;
    }

    h2 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
    }

    .date {
      font-weight: bold;
      margin-top: 10px;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #ddd;
      margin: 30px auto;
    }

    .map-btn {
      display: inline-block;
      padding: 12px 20px;
      margin-top: 10px;
      background: #333;
      color: #fff;
      text-decoration: none;
      border-radius: 20px;
      font-size: 14px;
    }

    footer {
      font-size: 12px;
      color: #aaa;
      padding: 20px 0;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- 메인 이미지 -->
    <img src="main.jpg" class="main-img" alt="웨딩 이미지">

    <!-- 인사말 -->
    <div class="section">
      <h1>OOO ♥ OOO</h1>
      <p>
        서로가 마주보며 다져온 사랑을<br>
        이제 함께 한 곳을 바라보며<br>
        걸어갈 수 있는 큰 사랑으로 키우고자 합니다.
      </p>

      <div class="date">
        2026년 5월 10일 (일) 오후 2시
      </div>
    </div>

    <div class="divider"></div>

    <!-- 장소 -->
    <div class="section">
      <h2>오시는 길</h2>
      <p>
        서울 ○○웨딩홀<br>
        서울시 ○○구 ○○로 123
      </p>

      <a href="https://maps.google.com" class="map-btn" target="_blank">
        지도 보기
      </a>
    </div>

    <div class="divider"></div>

    <!-- 연락 -->
    <div class="section">
      <h2>연락하기</h2>
      <p>신랑 OOO 📞 010-0000-0000</p>
      <p>신부 OOO 📞 010-0000-0000</p>
    </div>

    <footer>
      © 2026 Wedding Invitation
    </footer>

  </div>

</body>
</html>
